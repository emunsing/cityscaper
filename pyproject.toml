[tool.poetry]
name = "cityscaper"
version = "0.1.0"
description = ""
authors = ["emunsing <eric.munsing@gmail.com>"]
readme = "README.md"

[tool.poetry.dependencies]
# Note: BPy currently requires Python 3.11
python = "3.11.*"
mathutils = "*"
pyreadr = "*"
pandas = "*"


# DEV DEPDENDENCIES - Jupyter, visualizations, etc. Add these like `$ poetry install --with dev`
osmnx = "^2.0.5"
shapely = "^2.1.1"
geopandas = "^1.1.1"
seaborn = "^0.13.2"
fiona = "^1.10.1"
loguru = "^0.7.3"
pathlib = "^1.0.1"
[tool.poetry.group.dev]
optional = true
[tool.poetry.group.dev.dependencies]
jupyter = "*"
ipykernel = "*"
pyarrow = "*"
matplotlib = "*"
python-dotenv = "*"
black = "*"
pytest = "*"
tqdm = "^4.67.1"
ipywidgets = "^8.1.7"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
