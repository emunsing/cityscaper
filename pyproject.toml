[tool.poetry]
name = "cityscaper"
version = "0.1.0"
description = ""
authors = ["emunsing <eric.munsing@gmail.com>"]
readme = "README.md"

[tool.poetry.dependencies]
# Note: BPy currently requires Python 3.11
python = "3.11.*"
mathutils = "*"
pyreadr = "*"
pandas = "*"


# DEV DEPDENDENCIES - Jupyter, visualizations, etc. Add these like `$ poetry install --with dev`
[tool.poetry.group.dev]
optional = true
[tool.poetry.group.dev.dependencies]
jupyter = "*"
ipykernel = "*"
pyarrow = "*"
matplotlib = "*"
python-dotenv = "*"
black = "*"
pytest = "*"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
